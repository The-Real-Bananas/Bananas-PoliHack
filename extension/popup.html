<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="popup.css" />
</head>

<body>
  <div class="glass-shell">
    <div class="noise"></div>
    <div class="frost"></div>

    <div class="header">
      <div class="header-left">
        <div class="icon-wrap">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
            <circle cx="11" cy="11" r="8" />
            <path d="m21 21-4.35-4.35" />
          </svg>
        </div>
        <div class="title-group">
          <span class="title">CONTENT FILTER</span>
        </div>
      </div>
      <button class="power-btn global-power" id="globalPower" type="button" data-active="true">
        <span class="power-indicator"></span>
        <span class="power-label">ON</span>
      </button>
    </div>

    <div class="main-content" id="mainContent">

      <div class="section">
        <div class="section-header">
          <div class="section-label">AI Detection</div>
          <button class="power-btn power-toggle" id="photoFilterPower" type="button" data-active="true">
            <span class="power-indicator"></span>
            <span class="power-label">ON</span>
          </button>
        </div>

        <div class="toggle-group" id="photoFilterGroup">
          <button class="toggle active" data-mode="flag" type="button" id="photoFilterFlagButton">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
              <path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z" />
              <line x1="4" y1="22" x2="4" y2="15" />
            </svg>
            <span>Flag</span>
          </button>
          <button class="toggle" data-mode="blur" type="button" id="photoFilterBlurButton">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
              <circle cx="12" cy="12" r="3" />
              <path d="M3 12h1m16 0h1M12 3v1m0 16v1m-6.4-3.6.7-.7m11.4-11.4.7-.7M5.6 5.6l.7.7m11.4 11.4.7.7" />
            </svg>
            <span>Blur</span>
          </button>
          <button class="toggle" data-mode="hide" type="button" id="photoFilterHideButton">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94" />
              <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19" />
              <line x1="1" y1="1" x2="23" y2="23" />
            </svg>
            <span>Hide</span>
          </button>
        </div>
        <div class="counter-row">
          <span class="counter-label">AI posts filtered</span>
          <span class="counter-value" id="aiCounter">0</span>
        </div>
      </div>

      <div class="divider"></div>

      <div class="section">
        <div class="section-header">
          <div class="section-label">Text Filter</div>
          <button class="power-btn power-toggle" id="textFilterPower" type="button" data-active="false">
            <span class="power-indicator"></span>
            <span class="power-label">OFF</span>
          </button>
        </div>

        <div class="toggle-group disabled" id="textFilterGroup">
          <button class="toggle" data-mode="hide" type="button" id="textFilterHideButton" disabled>
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94" />
              <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19" />
              <line x1="1" y1="1" x2="23" y2="23" />
            </svg>
            <span>Hide</span>
          </button>
          <button class="toggle" data-mode="flag" type="button" id="textFilterFlagButton" disabled>
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
              <path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z" />
              <line x1="4" y1="22" x2="4" y2="15" />
            </svg>
            <span>Flag</span>
          </button>
        </div>
        <div class="counter-row">
          <span class="counter-label">Text filtered</span>
          <span class="counter-value" id="textCounter">0</span>
        </div>
      </div>

      <div class="divider"></div>

      <div class="section">
        <div class="section-header">
          <div class="section-label">Propaganda Filter</div>
          <button class="power-btn power-toggle" id="propagandaPower" type="button" data-active="false">
            <span class="power-indicator"></span>
            <span class="power-label">OFF</span>
          </button>
        </div>

        <div class="toggle-group disabled" id="propagandaToggleGroup">
          <button class="toggle" data-mode="hide" type="button" id="propagandaHideButton" disabled>
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94" />
              <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19" />
              <line x1="1" y1="1" x2="23" y2="23" />
            </svg>
            <span>Hide</span>
          </button>
          <button class="toggle" data-mode="flag" type="button" id="propagandaFlagButton" disabled>
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
              <path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z" />
              <line x1="4" y1="22" x2="4" y2="15" />
            </svg>
            <span>Flag</span>
          </button>
        </div>
        <div class="counter-row">
          <span class="counter-label">Propaganda filtered</span>
          <span class="counter-value" id="propagandaCounter">0</span>
        </div>
      </div>

    </div>

    <div class="footer">
      <span class="pulse-ring"></span>
      <span class="pulse-dot"></span>
      <span class="status-text" id="statusText">Scanning continuously</span>
    </div>
  </div>

  <script type="module" src="src/popup.ts"></script>
</body>

</html>
